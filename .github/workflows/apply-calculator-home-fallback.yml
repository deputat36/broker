name: Apply calculator home fallback

on:
  push:
    branches: ["perf/conditional-calculator-script"]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: perf/conditional-calculator-script
          fetch-depth: 0
          show-progress: false
      - name: Apply exact calculator markers
        run: |
          python3 - <<'PY'
          from pathlib import Path

          index = Path('index.md')
          text = index.read_text(encoding='utf-8')
          old = '<div class="calc-result" data-calc-result></div>'
          new = '<div class="calc-result is-error" data-calc-result><span>Калькулятор загружается</span><strong>Введите параметры для предварительного расчёта</strong><small>Если результат не появился, обновите страницу или свяжитесь с Татьяной напрямую.</small></div>'
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit('Expected home calculator result marker was not found exactly once')
              index.write_text(text.replace(old, new, 1), encoding='utf-8')

          layout = Path('_layouts/default.html')
          text = layout.read_text(encoding='utf-8')
          old = "{% if page.url == '/kalkulyator-ipoteki/' %}"
          new = "{% if page.url == '/' or page.url == '/kalkulyator-ipoteki/' %}"
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit('Expected calculator layout condition was not found exactly once')
              layout.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git diff --check
      - name: Commit calculator markers
        run: |
          git add index.md _layouts/default.html
          if git diff --cached --quiet; then
            echo "Home calculator markers are already present"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Подключить модуль калькулятора на главной"
          git push origin HEAD:perf/conditional-calculator-script
