name: Apply application fallback

on:
  push:
    branches: ["fix/application-runtime-fallback"]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/application-runtime-fallback
          fetch-depth: 0
          show-progress: false
      - name: Apply exact source changes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding="utf-8")
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f"Expected marker not found: {path}: {old[:80]}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          page = Path("online-zayavka.md")
          replace_once(
              page,
              '    <form\n      class="application-card"',
              "    {% include application-runtime-fallback.html runtime=true %}\n"
              "    <noscript>{% include application-runtime-fallback.html %}</noscript>\n\n"
              '    <form\n      class="application-card"',
          )
          replace_once(
              page,
              '      <button class="btn btn-primary application-submit" type="submit">Проверить и подготовить заявку</button>',
              '      <button class="btn btn-primary application-submit" type="submit" data-application-submit disabled aria-busy="true">Проверить и подготовить заявку</button>',
          )
          replace_once(
              page,
              '      <p class="application-status" data-application-status aria-live="polite"></p>',
              '      <p class="application-status" data-application-status aria-live="polite">Загружаем форму…</p>',
          )
          replace_once(
              page,
              "<script src=\"{{ '/assets/js/thankyou-storage-privacy.js' | relative_url }}\" defer></script>",
              "<script>\n"
              "  (function () {\n"
              "    var form = document.querySelector('[data-online-application]');\n"
              "    if (!form) return;\n"
              "    window.setTimeout(function () {\n"
              "      if (form.dataset.applicationReady === 'true') return;\n"
              "      var fallback = document.querySelector('[data-application-runtime-fallback]');\n"
              "      var status = form.querySelector('[data-application-status]');\n"
              "      if (fallback) fallback.hidden = false;\n"
              "      if (status) {\n"
              "        status.textContent = 'Форма не загрузилась. Используйте резервный способ обращения выше.';\n"
              "        status.classList.add('is-error');\n"
              "      }\n"
              "    }, 5000);\n"
              "  })();\n"
              "</script>\n"
              "<script src=\"{{ '/assets/js/thankyou-storage-privacy.js' | relative_url }}\" defer></script>",
          )

          script = Path("assets/js/online-application.js")
          replace_once(
              script,
              "  const status = form.querySelector('[data-application-status]');",
              "  const status = form.querySelector('[data-application-status]');\n"
              "  const submitButton = form.querySelector('[data-application-submit]');\n"
              "  const runtimeFallback = document.querySelector('[data-application-runtime-fallback]');",
          )
          replace_once(
              script,
              "    track('online_application_vk');\n  });\n})();",
              "    track('online_application_vk');\n"
              "  });\n\n"
              "  form.dataset.applicationReady = 'true';\n"
              "  if (submitButton) {\n"
              "    submitButton.disabled = false;\n"
              "    submitButton.removeAttribute('aria-busy');\n"
              "  }\n"
              "  if (runtimeFallback) runtimeFallback.hidden = true;\n"
              "  setStatus('');\n"
              "})();",
          )
          PY
          node --check assets/js/online-application.js
          git diff --check
      - name: Commit source changes
        run: |
          git add online-zayavka.md assets/js/online-application.js
          if git diff --cached --quiet; then
            echo "Application fallback is already applied"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Добавить runtime-резерв онлайн-заявки"
          git push origin HEAD:fix/application-runtime-fallback
