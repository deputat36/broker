name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Run required post-build checks
        run: bash scripts/post-build-check.sh ./_site
      - name: Audit built HTML, links and structured data
        run: python3 scripts/audit-built-site.py ./_site
      - name: Audit district materials cluster
        run: python3 scripts/audit-district-materials.py ./_site
      - name: Audit conversion pages and CTA
        run: python3 scripts/audit-conversion-pages.py ./_site
      - name: Audit SEO of service pages
        run: python3 scripts/audit-service-seo.py ./_site
      - name: Audit regional landing pages
        run: python3 scripts/audit-regional-pages.py ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
