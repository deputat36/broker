name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  source-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Normalize Jekyll front matter
        run: python3 scripts/prepare-jekyll-source.py --write
      - name: Verify source preparation idempotence
        run: bash scripts/check-jekyll-preparation.sh
      - name: Validate source syntax
        run: |
          node --check assets/js/main.js
          node --check assets/js/application-delivery-keepalive.js
          node --check assets/js/application-inputs.js
          node --check assets/js/application-preparation.js
          node --check assets/js/online-application.js
          node --check assets/js/thankyou-storage-privacy.js
          python3 -m compileall -q scripts
      - name: Run source audit suite
        run: |
          set +e
          : > source-audits.log
          failures=0

          run_audit() {
            label="$1"
            shift
            echo "===== ${label} =====" | tee -a source-audits.log
            "$@" 2>&1 | tee -a source-audits.log
            status=${PIPESTATUS[0]}
            if [ "$status" -ne 0 ]; then
              echo "FAILED: ${label} (${status})" | tee -a source-audits.log
              failures=$((failures + 1))
            else
              echo "PASSED: ${label}" | tee -a source-audits.log
            fi
          }

          run_audit "Supabase backend v2 source" python3 scripts/audit-supabase-backend.py
          run_audit "Supabase function security config" python3 scripts/audit-supabase-function-config.py
          run_audit "Protected notification retry" python3 scripts/audit-notification-retry.py
          run_audit "Protected notification health" python3 scripts/audit-notification-health.py
          run_audit "Disabled-by-default lead retention" python3 scripts/audit-data-retention.py
          run_audit "Protected individual privacy requests" python3 scripts/audit-privacy-requests.py
          run_audit "Restricted lead operational guard" python3 scripts/audit-processing-restriction.py
          run_audit "Restricted delivery response" python3 scripts/audit-restricted-delivery-response.py
          run_audit "Minimal public lead response" python3 scripts/audit-public-lead-response.py
          run_audit "Safe public lead errors" python3 scripts/audit-public-lead-errors.py
          run_audit "Application error UI" python3 scripts/audit-application-error-ui.py
          run_audit "Hybrid delivery state" python3 scripts/audit-hybrid-delivery-state.py
          run_audit "Aggregate Supabase readiness" python3 scripts/audit-supabase-readiness.py

          echo "Source audit failures: ${failures}" | tee -a source-audits.log
          test "$failures" -eq 0
      - name: Upload source audit diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: source-audit-diagnostics
          path: |
            source-audits.log
            prepare-second-pass.log
          if-no-files-found: error
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: source-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Prepare Jekyll source
        run: python3 scripts/prepare-jekyll-source.py --write
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Run post-build audit suite
        run: |
          set +e
          : > post-build-audits.log
          failures=0

          run_audit() {
            label="$1"
            shift
            echo "===== ${label} =====" | tee -a post-build-audits.log
            "$@" 2>&1 | tee -a post-build-audits.log
            status=${PIPESTATUS[0]}
            if [ "$status" -ne 0 ]; then
              echo "FAILED: ${label} (${status})" | tee -a post-build-audits.log
              failures=$((failures + 1))
            else
              echo "PASSED: ${label}" | tee -a post-build-audits.log
            fi
          }

          run_audit "Required post-build checks" bash scripts/post-build-check.sh ./_site
          run_audit "Built HTML, links and structured data" python3 scripts/audit-built-site.py ./_site
          run_audit "District materials cluster" python3 scripts/audit-district-materials.py ./_site
          run_audit "Conversion pages and CTA" python3 scripts/audit-conversion-pages.py ./_site
          run_audit "Unconfirmed ETAGI terms" python3 scripts/audit-etagi-terms.py ./_site
          run_audit "ETAGI terms in useful materials" python3 scripts/audit-etagi-content-pages.py ./_site
          run_audit "SEO of service pages" python3 scripts/audit-service-seo.py ./_site
          run_audit "Regional landing pages" python3 scripts/audit-regional-pages.py ./_site
          run_audit "Regional content uniqueness" python3 scripts/audit-regional-uniqueness.py ./_site
          run_audit "Distinct regional content intents" python3 scripts/audit-regional-intents.py ./_site
          run_audit "Regional reading paths" python3 scripts/audit-regional-link-paths.py ./_site
          run_audit "Complex application routes" python3 scripts/audit-complex-application-routes.py ./_site
          run_audit "Complex application preparation context" python3 scripts/audit-application-preparation-context.py ./_site
          run_audit "Online application and remote service route" python3 scripts/audit-online-application.py ./_site
          run_audit "Thank-you privacy" python3 scripts/audit-thankyou-privacy.py ./_site
          run_audit "Progressive mobile application UX" python3 scripts/audit-application-ux.py ./_site
          run_audit "Live-domain contract against Pages artifact" python3 scripts/smoke-live-domain.py --site-dir ./_site

          echo "Post-build audit failures: ${failures}" | tee -a post-build-audits.log
          test "$failures" -eq 0
      - name: Upload post-build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: post-build-audit-diagnostics
          path: post-build-audits.log
          if-no-files-found: error
          retention-days: 7
      - name: Upload built site diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: built-site-diagnostics
          path: ./_site
          if-no-files-found: error
          retention-days: 1
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  production-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Verify published custom domain
        run: |
          set -o pipefail
          python3 scripts/smoke-live-domain.py --attempts 12 --delay 15 --timeout 20 2>&1 | tee production-smoke.log
      - name: Upload production smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-diagnostics
          path: production-smoke.log
          if-no-files-found: error
          retention-days: 7
