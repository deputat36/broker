name: Canonicalize prepared sources

on:
  push:
    branches: ["refactor/canonical-prebuild-output"]

permissions:
  contents: write

jobs:
  canonicalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: refactor/canonical-prebuild-output
          fetch-depth: 0
          show-progress: false
      - name: Prepare selected canonical sources
        run: |
          python3 scripts/prepare-jekyll-source.py --write
          python3 scripts/prepare-conditional-assets.py --write
          git diff --check
      - name: Commit prepared sources
        run: |
          git add \
            assets/js/online-application.js \
            scripts/audit-public-lead-response.py \
            scripts/audit-hybrid-delivery-state.py \
            index.md \
            o-brokere.md \
            _layouts/default.html
          if git diff --cached --quiet; then
            echo "Selected sources are already canonical"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Канонизировать подготовленные исходники"
          git push origin HEAD:refactor/canonical-prebuild-output
