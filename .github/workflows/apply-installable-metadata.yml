name: Apply installable metadata

on:
  push:
    branches: ["feat/installable-site-icons"]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/installable-site-icons
          fetch-depth: 0
          show-progress: false
      - name: Apply exact layout change
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('_layouts/default.html')
          text = path.read_text(encoding='utf-8')
          old = '''  <link rel="icon" href="{{ '/assets/img/favicon.svg' | relative_url }}" type="image/svg+xml">
          <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
          <meta name="application-name" content="Татьяна Стерликова">
          <meta name="mobile-web-app-capable" content="yes">
          <meta name="apple-mobile-web-app-title" content="Татьяна Стерликова">'''
          new = '''  <link rel="icon" href="{{ '/assets/img/favicon.svg' | relative_url }}" type="image/svg+xml">
          <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/img/apple-touch-icon.png' | relative_url }}">
          <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
          <meta name="application-name" content="Татьяна Стерликова">
          <meta name="mobile-web-app-capable" content="yes">
          <meta name="apple-mobile-web-app-capable" content="yes">
          <meta name="apple-mobile-web-app-title" content="Татьяна Стерликова">'''
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit('Expected layout marker was not found exactly once')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git diff --check
      - name: Commit layout change
        run: |
          git add _layouts/default.html
          if git diff --cached --quiet; then
            echo "Install metadata is already present"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Подключить install-метаданные в общем layout"
          git push origin HEAD:feat/installable-site-icons
