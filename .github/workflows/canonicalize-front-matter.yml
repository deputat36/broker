name: Canonicalize front matter

on:
  push:
    branches: ["refactor/canonical-front-matter"]

permissions:
  contents: write

jobs:
  canonicalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: refactor/canonical-front-matter
          fetch-depth: 0
          show-progress: false
      - name: Normalize Markdown front matter
        run: |
          python3 scripts/prepare-jekyll-source.py --write
          git diff --check
      - name: Commit canonical Markdown
        run: |
          git add -- '*.md' ':(glob)**/*.md'
          if git diff --cached --quiet; then
            echo "Markdown front matter is already canonical"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Канонизировать Markdown front matter"
          git push origin HEAD:refactor/canonical-front-matter
