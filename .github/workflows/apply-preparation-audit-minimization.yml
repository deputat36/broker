name: Apply preparation audit minimization

on:
  push:
    branches: ["privacy/minimize-web3forms-payload"]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: privacy/minimize-web3forms-payload
          fetch-depth: 0
          show-progress: false
      - name: Update preparation audit
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/audit-application-preparation-context.py')
          text = path.read_text(encoding='utf-8')
          old = '''        "preparation_json",
                  "fields.preparation = data",
                  "payload.preparation = data",'''
          new = '''        "preparation_json",
                  "payload.preparation = data",'''
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit('Required preparation marker not found exactly once')
              text = text.replace(old, new, 1)
          old = '''    forbidden_markers = (
                  "commentField.value =",
                  "Комментарий клиента:",
                  "MAX_COMBINED_COMMENT_LENGTH",
              )'''
          new = '''    forbidden_markers = (
                  "commentField.value =",
                  "Комментарий клиента:",
                  "MAX_COMBINED_COMMENT_LENGTH",
                  "fields_json",
                  "fields.preparation = data",
              )'''
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit('Forbidden preparation marker not found exactly once')
              text = text.replace(old, new, 1)
          old = '        "отметок 4, Web3Forms/preparation JSON и сводка для резервных каналов"'
          new = '        "отметок 4, отдельные поля Web3Forms, preparation JSON и сводка для резервных каналов"'
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit('Success text marker not found exactly once')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          python3 -m py_compile scripts/audit-application-preparation-context.py
          git diff --check
      - name: Commit audit update
        run: |
          git add scripts/audit-application-preparation-context.py
          if git diff --cached --quiet; then
            echo "Preparation audit is already minimized"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "418982982+github-actions[bot]@users.noreply.github.com"
          git commit -m "Обновить preparation-аудит после минимизации"
          git push origin HEAD:privacy/minimize-web3forms-payload
