name: Apply application payload privacy

on:
  push:
    branches: ["privacy/sanitize-application-payload-context"]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: privacy/sanitize-application-payload-context
          fetch-depth: 0
          show-progress: false
      - name: Apply and validate privacy migration
        run: |
          python3 scripts/apply-application-payload-privacy.py
          node --check assets/js/online-application.js
          git diff --check
      - name: Commit privacy changes
        run: |
          git add assets/js/online-application.js policy.md
          if git diff --cached --quiet; then
            echo "Payload privacy is already present"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Санитизировать контекст payload заявки"
          git push origin HEAD:privacy/sanitize-application-payload-context
